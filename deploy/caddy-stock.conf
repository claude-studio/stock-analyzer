# Caddy 리버스프록시 설정
# 이 내용을 /home/ubuntu/infra/caddy/Caddyfile에 추가

stock.brian-dev.cloud {
    # API 요청은 백엔드로
    handle /api/* {
        reverse_proxy stock-api:8000
    }
    handle /health {
        reverse_proxy stock-api:8000
    }
    # 나머지는 프론트엔드로
    handle {
        reverse_proxy stock-frontend:3000
    }
    header {
        Strict-Transport-Security "max-age=31536000; includeSubDomains"
        X-Content-Type-Options "nosniff"
        X-Frame-Options "DENY"
        -Server
        -X-Powered-By
    }
}
