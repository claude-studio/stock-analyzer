# Caddy 리버스프록시 설정
# 이 내용을 /home/ubuntu/infra/caddy/Caddyfile에 추가

stock.brian-dev.cloud {
    # 모든 요청은 프론트엔드(Next)로 전달
    # /api/v1/*, /health는 프론트 서버 라우트가 내부적으로 백엔드에 프록시함
    handle {
        reverse_proxy stock-frontend:3000
    }
    header {
        Strict-Transport-Security "max-age=31536000; includeSubDomains"
        X-Content-Type-Options "nosniff"
        X-Frame-Options "DENY"
        -Server
        -X-Powered-By
    }
}
