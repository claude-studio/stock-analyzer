name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image tag override
        required: false
        type: string

concurrency:
  group: stock-analyzer-production
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  API_IMAGE_NAME: stock-analyzer-api
  FRONTEND_IMAGE_NAME: stock-analyzer-frontend

jobs:
  verify-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Ruff check
        run: ruff check app scripts tests

      - name: Pytest
        run: PYTHONPATH=. pytest -q

  verify-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend lint
        run: npm run lint

      - name: Frontend build
        run: npm run build

  build-and-push:
    runs-on: ubuntu-latest
    needs:
      - verify-backend
      - verify-frontend
    outputs:
      api_image: ${{ steps.meta.outputs.api_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image metadata
        id: meta
        run: |
          IMAGE_TAG="${{ github.event.inputs.image_tag || github.sha }}"
          OWNER_LOWER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "owner_lower=$OWNER_LOWER" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "api_image=${REGISTRY}/${OWNER_LOWER}/${API_IMAGE_NAME}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${REGISTRY}/${OWNER_LOWER}/${FRONTEND_IMAGE_NAME}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.api_image }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.frontend_image }}

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build-and-push
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' '${{ secrets.OCI_DEPLOY_SSH_KEY }}' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' '${{ secrets.OCI_DEPLOY_KNOWN_HOSTS }}' > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Upload deployment files
        run: |
          ssh -i ~/.ssh/id_ed25519 '${{ secrets.OCI_DEPLOY_USER }}@${{ secrets.OCI_DEPLOY_HOST }}' "mkdir -p '${{ secrets.OCI_APP_DIR }}/deploy'"
          scp -i ~/.ssh/id_ed25519 docker-compose.prod.yml '${{ secrets.OCI_DEPLOY_USER }}@${{ secrets.OCI_DEPLOY_HOST }}:${{ secrets.OCI_APP_DIR }}/docker-compose.prod.yml'
          scp -i ~/.ssh/id_ed25519 deploy/remote-deploy.sh '${{ secrets.OCI_DEPLOY_USER }}@${{ secrets.OCI_DEPLOY_HOST }}:${{ secrets.OCI_APP_DIR }}/deploy/remote-deploy.sh'

      - name: Run remote deploy
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          API_IMAGE: ${{ needs.build-and-push.outputs.api_image }}
          FRONTEND_IMAGE: ${{ needs.build-and-push.outputs.frontend_image }}
        run: |
          ssh -i ~/.ssh/id_ed25519 '${{ secrets.OCI_DEPLOY_USER }}@${{ secrets.OCI_DEPLOY_HOST }}' \
            "chmod +x '${{ secrets.OCI_APP_DIR }}/deploy/remote-deploy.sh' && \
             APP_DIR='${{ secrets.OCI_APP_DIR }}' \
             GHCR_USERNAME='${GHCR_USERNAME}' \
             GHCR_TOKEN='${GHCR_TOKEN}' \
             API_IMAGE='${API_IMAGE}' \
             FRONTEND_IMAGE='${FRONTEND_IMAGE}' \
             bash '${{ secrets.OCI_APP_DIR }}/deploy/remote-deploy.sh'"
