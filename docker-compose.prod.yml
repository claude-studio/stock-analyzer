services:
  stock-api:
    image: ${API_IMAGE}
    container_name: stock-api
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=Asia/Seoul
    volumes:
      - claude_auth:/root/.claude
      - ./data:/app/data
    networks:
      - stock_net
      - infra_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      stock-redis:
        condition: service_healthy

  stock-frontend:
    image: ${FRONTEND_IMAGE}
    container_name: stock-frontend
    restart: unless-stopped
    environment:
      - HOSTNAME=0.0.0.0
      - API_URL=http://stock-api:8000
    networks:
      - stock_net
      - infra_net
    depends_on:
      stock-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  stock-redis:
    image: redis:7-alpine
    container_name: stock-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 100
    volumes:
      - redis_data:/data
    networks:
      - stock_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

networks:
  stock_net:
    driver: bridge
  infra_net:
    external: true
    name: infra_default

volumes:
  redis_data:
  claude_auth:
